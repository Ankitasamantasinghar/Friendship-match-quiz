<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Friendship Match Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- START SCREEN -->
  <div id="start-screen" class="card">

    <h1>Friendship Match Quiz 💖</h1>

    <p>Play and check how much your choices match!</p>

    <input
      type="text"
      id="username"
      placeholder="Enter Your Name"
    >

    <button onclick="startQuiz()">
      Start Quiz
    </button>

  </div>

  <!-- QUIZ SCREEN -->
  <div id="quiz-screen" class="hidden">

    <div class="top-bar">

      <h2 id="question-number"></h2>

      <div id="score">
        Score: 0
      </div>

    </div>

    <h1 id="question"></h1>

    <div
      id="options"
      class="options-container"
    ></div>

    <div class="navigation-buttons">

      <button id="prev-btn"
      onclick="previousQuestion()">
        Previous
      </button>

      <button id="next-btn"
      onclick="nextQuestion()">
        Next
      </button>

    </div>

  </div>

  <!-- RESULT -->
  <div
    id="result-screen"
    class="hidden card"
  >

    <h1>Quiz Finished 🎉</h1>

    <h2 id="final-score"></h2>

    <h3 id="result-message"></h3>

    <button onclick="restartQuiz()">
      Play Again
    </button>

  </div>

  <!-- LEADERBOARD -->
  <div class="leaderboard">

    <div class="leaderboard-top">

      <h2>Leaderboard 🏆</h2>

      <button
        id="admin-btn"
        onclick="adminLogin()"
      >
        Admin Delete
      </button>

    </div>

    <ul id="leaderboard-list"></ul>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
